services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - MCP_SERVER_URL=${DOCKER_MCP_SERVER_URL:-http://host.docker.internal:8001/sse}
      - CHAT_HISTORY_DB_PATH=/app/data/chat_history.sqlite3
    volumes:
      - ./data:/app/data

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8502:8501"
    environment:
      - API_BASE_URL=http://api:8002
    depends_on:
      - api
