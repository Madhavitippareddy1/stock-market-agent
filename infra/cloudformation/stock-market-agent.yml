AWSTemplateFormatVersion: "2010-09-09"
Description: Stock Market Agent infrastructure with ECR, ECS Fargate, RDS PostgreSQL, CodeBuild, optional CodePipeline, IAM, S3, and CloudWatch.

Parameters:
  ProjectName:
    Type: String
    Default: stock-market-agent
  Environment:
    Type: String
    Default: dev
  RequiredProjectTag:
    Type: String
    Default: dstrmaysam
    Description: Required capstone tag value for cost tracking and cleanup.
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  DatabaseSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnet IDs for RDS PostgreSQL.
  AssignPublicIp:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - DISABLED
  AllowedIngressCidr:
    Type: String
    Default: 0.0.0.0/0
  McpServerUrl:
    Type: String
    Default: http://localhost:8001/sse
  ReportsBucketName:
    Type: String
    Default: ""
  OpenSearchEndpoint:
    Type: String
    Default: ""
  OpenSearchIndex:
    Type: String
    Default: financial-report-chunks
  BedrockChatModelId:
    Type: String
    Default: amazon.nova-lite-v1:0
  BedrockEmbeddingModelId:
    Type: String
    Default: amazon.titan-embed-text-v2:0
  LangfuseEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  LangfusePublicKey:
    Type: String
    Default: ""
  LangfuseSecretKey:
    Type: String
    Default: ""
    NoEcho: true
  LangfuseBaseUrl:
    Type: String
    Default: https://cloud.langfuse.com
  LangfuseFlushOnRequest:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  RagasEnabled:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  RagasScorePrefix:
    Type: String
    Default: ragas
  GitHubOwner:
    Type: String
    Default: ""
  GitHubRepo:
    Type: String
    Default: ""
  GitHubBranch:
    Type: String
    Default: main
  CodeStarConnectionArn:
    Type: String
    Default: ""
  DatabaseName:
    Type: String
    Default: stockagent
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]{1,62}$"
  DatabaseUsername:
    Type: String
    Default: stockadmin
    NoEcho: true
  DatabaseInstanceClass:
    Type: String
    Default: db.t4g.micro
  DatabaseAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 100
  DatabaseBackupRetentionDays:
    Type: Number
    Default: 7
    MinValue: 0
    MaxValue: 35

Conditions:
  HasReportsBucket: !Not [!Equals [!Ref ReportsBucketName, ""]]
  HasLangfuseSecret: !Not [!Equals [!Ref LangfuseSecretKey, ""]]
  CreatePipeline: !And
    - !Not [!Equals [!Ref GitHubOwner, ""]]
    - !Not [!Equals [!Ref GitHubRepo, ""]]
    - !Not [!Equals [!Ref CodeStarConnectionArn, ""]]

Resources:
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-repo"
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep the latest 20 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 20
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-pipeline-artifacts-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  EcsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${Environment}-${RequiredProjectTag}-${ProjectName}"
      RetentionInDays: 14
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  CodeBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/codebuild/${Environment}-${RequiredProjectTag}-${ProjectName}"
      RetentionInDays: 14
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Streamlit traffic to ECS tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8501
          ToPort: 8501
          CidrIp: !Ref AllowedIngressCidr
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-ecs-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL access from ECS tasks only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EcsSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-rds-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${Environment}/${RequiredProjectTag}/${ProjectName}/rds"
      Description: PostgreSQL credentials for Stock Market Agent
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username":"${DatabaseUsername}"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  LangfuseSecret:
    Type: AWS::SecretsManager::Secret
    Condition: HasLangfuseSecret
    Properties:
      Name: !Sub "${Environment}/${RequiredProjectTag}/${ProjectName}/langfuse"
      Description: Langfuse secret key for Stock Market Agent observability
      SecretString: !Sub '{"LANGFUSE_SECRET_KEY":"${LangfuseSecretKey}"}'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private RDS subnets for Stock Market Agent
      DBSubnetGroupName: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-db-subnet-group"
      SubnetIds: !Ref DatabaseSubnetIds
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  DatabaseInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-postgres"
      DBName: !Ref DatabaseName
      Engine: postgres
      EngineVersion: "16.3"
      DBInstanceClass: !Ref DatabaseInstanceClass
      AllocatedStorage: !Ref DatabaseAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: !Sub "{{resolve:secretsmanager:${DatabaseSecret}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DatabaseSecret}:SecretString:password}}"
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: !Ref DatabaseBackupRetentionDays
      DeletionProtection: false
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  EcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-ecs-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-ecs-secrets-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref DatabaseSecret
                  - !If
                    - HasLangfuseSecret
                    - !Ref LangfuseSecret
                    - !Ref AWS::NoValue
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-ecs-task-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref DatabaseSecret
              - Effect: Allow
                Action:
                  - aoss:APIAccessAll
                Resource: "*"
              - !If
                - HasReportsBucket
                - Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:ListBucket
                  Resource:
                    - !Sub "arn:aws:s3:::${ReportsBucketName}"
                    - !Sub "arn:aws:s3:::${ReportsBucketName}/*"
                - !Ref AWS::NoValue
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  EcsTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}"
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: stock-market-agent
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepository}:latest"
          Essential: true
          PortMappings:
            - ContainerPort: 8501
              HostPort: 8501
              Protocol: tcp
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: MCP_SERVER_URL
              Value: !Ref McpServerUrl
            - Name: REPORTS_BUCKET
              Value: !Ref ReportsBucketName
            - Name: OPENSEARCH_ENDPOINT
              Value: !Ref OpenSearchEndpoint
            - Name: OPENSEARCH_INDEX
              Value: !Ref OpenSearchIndex
            - Name: BEDROCK_CHAT_MODEL_ID
              Value: !Ref BedrockChatModelId
            - Name: BEDROCK_EMBEDDING_MODEL_ID
              Value: !Ref BedrockEmbeddingModelId
            - Name: LANGFUSE_ENABLED
              Value: !Ref LangfuseEnabled
            - Name: LANGFUSE_PUBLIC_KEY
              Value: !Ref LangfusePublicKey
            - Name: LANGFUSE_BASE_URL
              Value: !Ref LangfuseBaseUrl
            - Name: LANGFUSE_FLUSH_ON_REQUEST
              Value: !Ref LangfuseFlushOnRequest
            - Name: RAGAS_ENABLED
              Value: !Ref RagasEnabled
            - Name: RAGAS_SCORE_PREFIX
              Value: !Ref RagasScorePrefix
            - Name: DATABASE_HOST
              Value: !GetAtt DatabaseInstance.Endpoint.Address
            - Name: DATABASE_PORT
              Value: !GetAtt DatabaseInstance.Endpoint.Port
            - Name: DATABASE_NAME
              Value: !Ref DatabaseName
            - Name: DATABASE_SECRET_ARN
              Value: !Ref DatabaseSecret
          Secrets:
            - Name: DATABASE_USERNAME
              ValueFrom: !Sub "${DatabaseSecret}:username::"
            - Name: DATABASE_PASSWORD
              ValueFrom: !Sub "${DatabaseSecret}:password::"
            - !If
              - HasLangfuseSecret
              - Name: LANGFUSE_SECRET_KEY
                ValueFrom: !Sub "${LangfuseSecret}:LANGFUSE_SECRET_KEY::"
              - !Ref AWS::NoValue
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref EcsLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  EcsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-service"
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref EcsTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref AssignPublicIp
          SecurityGroups:
            - !Ref EcsSecurityGroup
          Subnets: !Ref SubnetIds
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-codebuild-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-codebuild-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${CodeBuildLogGroup.Arn}:*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:GetAuthorizationToken
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource: !Sub "${ArtifactBucket.Arn}/*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}"
      Description: !Sub "Build and test ${ProjectName}, then push Docker image to ECR"
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: ECR_REPOSITORY_NAME
            Value: !Ref EcrRepository
          - Name: CONTAINER_NAME
            Value: stock-market-agent
      LogsConfig:
        CloudWatchLogs:
          GroupName: !Ref CodeBuildLogGroup
          Status: ENABLED
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  CodePipelineRole:
    Type: AWS::IAM::Role
    Condition: CreatePipeline
    Properties:
      RoleName: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-codepipeline-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}-codepipeline-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                  - s3:PutObject
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                  - ecs:RegisterTaskDefinition
                  - ecs:UpdateService
                  - iam:PassRole
                Resource: "*"
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref CodeStarConnectionArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

  CodePipeline:
    Type: AWS::CodePipeline::Pipeline
    Condition: CreatePipeline
    Properties:
      Name: !Sub "${Environment}-${RequiredProjectTag}-${ProjectName}"
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              OutputArtifacts:
                - Name: source_output
              Configuration:
                ConnectionArn: !Ref CodeStarConnectionArn
                FullRepositoryId: !Sub "${GitHubOwner}/${GitHubRepo}"
                BranchName: !Ref GitHubBranch
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              InputArtifacts:
                - Name: source_output
              OutputArtifacts:
                - Name: build_output
              Configuration:
                ProjectName: !Ref CodeBuildProject
        - Name: Deploy
          Actions:
            - Name: Deploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: ECS
                Version: "1"
              InputArtifacts:
                - Name: build_output
              Configuration:
                ClusterName: !Ref EcsCluster
                ServiceName: !Ref EcsService
                FileName: imagedefinitions.json
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: dstrmaysam
          Value: !Ref RequiredProjectTag

Outputs:
  EcrRepositoryUri:
    Value: !GetAtt EcrRepository.RepositoryUri
  EcsClusterName:
    Value: !Ref EcsCluster
  EcsServiceName:
    Value: !Ref EcsService
  CodeBuildProjectName:
    Value: !Ref CodeBuildProject
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
  DatabaseEndpoint:
    Value: !GetAtt DatabaseInstance.Endpoint.Address
  DatabaseSecretArn:
    Value: !Ref DatabaseSecret
  CodePipelineName:
    Condition: CreatePipeline
    Value: !Ref CodePipeline
